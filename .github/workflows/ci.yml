name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - 22.12.0
          - 24.x
    steps:
      - name: Checkout (actions/checkout v4 pinned)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node (actions/setup-node v4 pinned)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Companion smoke
        run: node dist/qa/companion-smoke.js rate-limit

      - name: Proxy write-timeout smoke
        run: node dist/qa/proxy-smoke.js write-timeout

      - name: Proxy ambiguous-timeout smoke
        run: node dist/qa/proxy-smoke.js publish-timeout

      - name: Package dry run
        run: npm pack --dry-run
