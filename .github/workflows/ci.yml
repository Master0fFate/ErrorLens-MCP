name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - 22.12.0
          - 24.x
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Companion smoke
        run: node dist/qa/companion-smoke.js rate-limit

      - name: Proxy write-timeout smoke
        run: node dist/qa/proxy-smoke.js write-timeout

      - name: Proxy ambiguous-timeout smoke
        run: node dist/qa/proxy-smoke.js publish-timeout

      - name: Package dry run
        run: npm pack --dry-run
